# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: FreeContext agent provider smoke test
prompts:
  - |
    Reply with exactly this text and nothing else:
    FREECONTEXT_SMOKE_OK
providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: anthropic-smoke
    metadata:
      providerGroup: anthropic
    config:
      temperature: 0
      max_tokens: 64

  - id: openai:chat:gpt-4.1-nano
    label: openai-smoke
    metadata:
      providerGroup: openai
    config:
      temperature: 0
      max_completion_tokens: 64

  - id: openai:chat:{{ env.OPENAI_COMPATIBLE_MODEL }}
    label: openai-compatible-smoke
    metadata:
      providerGroup: openai-compatible
    config:
      apiBaseUrl: "{{ env.OPENAI_COMPATIBLE_BASE_URL }}"
      apiKey: "{{ env.OPENAI_COMPATIBLE_API_KEY }}"
      temperature: 0
      max_completion_tokens: 64

tests:
  - description: provider returns the exact smoke token
    assert:
      - type: equals
        value: FREECONTEXT_SMOKE_OK
