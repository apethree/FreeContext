# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Fulltext retrieval tool evals (fixture workspace)"
envFile: .env.local

prompts:
  - "Call the requested FreeContext MCP tool and return its structured output."

providers:
  - id: file://./providers/mcp-client.js
    label: mcp-client-fulltext
    config:
      endpointEnvVar: FREE_CONTEXT_EVAL_MCP_ENDPOINT

evaluateOptions:
  maxConcurrency: 1
  cache: false

defaultTest:
  metadata:
    suite: tool-fulltext-evals
    workspace: oneshot-platform-fixture

tests:
  - description: "fulltext: plugin routing through the gateway registry"
    metadata:
      mode: fulltext
      expectedSymbol: dispatchPlugin
    vars:
      tool: search_code
      args:
        query: dispatchPlugin
        pathPrefix: apps/gateway/src/channels/
        limit: 10
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).count > 0"
      - type: javascript
        value: "JSON.parse(output).results.some((r) => r.filePath === 'apps/gateway/src/channels/plugin-registry.ts')"

  - description: "fulltext: gateway client auth from bearer tokens"
    metadata:
      mode: fulltext
      expectedSymbol: requireClientAuth
    vars:
      tool: search_code
      args:
        query: requireClientAuth
        pathPrefix: apps/gateway/src/api/
        limit: 10
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).count > 0"
      - type: javascript
        value: "JSON.parse(output).results.some((r) => r.symbolName === 'requireClientAuth')"

  - description: "fulltext: synced credentials collection hook"
    metadata:
      mode: fulltext
      expectedSymbol: useCredentialsCollection
    vars:
      tool: search_code
      args:
        query: useCredentialsCollection
        limit: 10
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).count > 0"
      - type: javascript
        value: "JSON.parse(output).results.some((r) => r.symbolName === 'useCredentialsCollection')"

  - description: "fulltext scoped to shared hooks and collections"
    metadata:
      mode: fulltext
      expectedSymbol: SyncCollectionsProvider
    vars:
      tool: search_code
      args:
        query: SyncCollectionsProvider
        pathPrefix: apps/one-shot/src/shared/
        limit: 10
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).count > 0"
      - type: javascript
        value: "JSON.parse(output).results.every((r) => r.filePath.startsWith('apps/one-shot/src/shared/'))"
