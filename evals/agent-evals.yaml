# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Agent evals: coding-agent default tools vs default tools + FreeContext vs scout + default tools + FreeContext"
envFile: ../.env.local

prompts:
  - |
    You are answering a code-intelligence question about the isolated fixture workspace.
    Use the available coding tools before answering.
    If FreeContext MCP is available, use it for symbol and graph lookups.
    Name exact file paths and exact function or method names.
    Do not claim to lack repository access when tools are available.

    Question: {{question}}

providers:
  - id: file://./providers/anthropic-default-tools.js
  - id: file://./providers/anthropic-freecontext.js
  - id: file://./providers/scout-provider.js
    config:
      mainProvider: anthropic
      scoutModel: qwen/qwen3.5-27b
  - id: file://./providers/openai-default-tools.js
  - id: file://./providers/openai-freecontext.js
  - id: file://./providers/scout-provider.js
    config:
      mainProvider: codex
      scoutModel: qwen/qwen3.5-27b

evaluateOptions:
  maxConcurrency: 1
  cache: false

defaultTest:
  metadata:
    suite: agent-evals
    category: coding-agent
  options:
    provider: anthropic:messages:claude-haiku-4-5-20251001
  vars:
    semantic: false
  assert:
    - type: javascript
      value: |
        const metadata = context.providerResponse?.metadata ?? {};
        const tier = metadata.tier;
        const localToolCount = metadata.localToolCount ?? 0;
        const mcpToolCount = metadata.mcpToolCount ?? 0;
        const scoutMcpToolCount = metadata.scoutMcpToolCount ?? 0;
        if (tier === "base") return localToolCount > 0 && mcpToolCount === 0;
        if (tier === "freecontext") return localToolCount > 0 && mcpToolCount > 0;
        if (tier === "scout") return localToolCount > 0 && mcpToolCount > 0 && scoutMcpToolCount > 0;
        return false;
    - type: not-contains
      value: "I don’t have access"
    - type: not-contains
      value: "I don't have access"

tests:
  - description: trace plugin dispatch callers across gateway entry points
    metadata:
      expected: |
        apps/gateway/src/channels/plugin-registry.ts defines dispatchPlugin.
        Callers include:
        - handleChannelUpsert in apps/gateway/src/api/client-routes.ts
        - handleChannelDelete in apps/gateway/src/api/client-routes.ts
        - methodChannelProbe in apps/gateway/src/realtime/methods.ts
        - methodChannelUpsert in apps/gateway/src/realtime/methods.ts
        - startInboundWorker in apps/gateway/src/workers/inbound-worker.ts
        - startOutboundWorker in apps/gateway/src/workers/outbound-worker.ts
    vars:
      question: Which functions call dispatchPlugin across the gateway API, realtime, and worker flows? Name at least three exact file paths and method names.
    assert:
      - type: contains
        value: apps/gateway/src/channels/plugin-registry.ts
      - type: contains
        value: dispatchPlugin
      - type: contains
        value: apps/gateway/src/realtime/methods.ts
      - type: contains
        value: methodChannelProbe
      - type: contains
        value: apps/gateway/src/api/client-routes.ts
      - type: contains
        value: handleChannelUpsert
      - type: llm-rubric
        value: The answer identifies dispatchPlugin in apps/gateway/src/channels/plugin-registry.ts and names concrete callers from the gateway API, realtime, or worker flows such as handleChannelUpsert, methodChannelProbe, startInboundWorker, or startOutboundWorker.

  - description: explain gateway client auth entry point
    metadata:
      expected: |
        requireClientAuth in apps/gateway/src/api/client-auth.ts authenticates gateway client requests.
        It is wired into the server path from main in apps/gateway/src/api/server.ts.
    vars:
      question: Which function authenticates gateway client requests, and where is it called from the server path? Name the exact file paths and method names only.
    assert:
      - type: contains
        value: apps/gateway/src/api/client-auth.ts
      - type: contains
        value: requireClientAuth
      - type: contains
        value: apps/gateway/src/api/server.ts
      - type: contains
        value: main
      - type: llm-rubric
        value: The answer identifies requireClientAuth in apps/gateway/src/api/client-auth.ts and explains that apps/gateway/src/api/server.ts calls it from the server request path.

  - description: explain synced credentials collection flow
    metadata:
      expected: |
        useCredentialsCollection in apps/one-shot/src/shared/hooks/useCredentials.ts returns the synced credentials collection.
        It depends on useSyncCollections and the provider in apps/one-shot/src/shared/collections/SyncCollectionsProvider.tsx.
    vars:
      question: Which hook returns the synced credentials collection, and which provider module does it depend on? Name the exact file paths and method names only.
    assert:
      - type: contains
        value: apps/one-shot/src/shared/hooks/useCredentials.ts
      - type: contains
        value: useCredentialsCollection
      - type: contains
        value: apps/one-shot/src/shared/collections/SyncCollectionsProvider.tsx
      - type: contains
        value: useSyncCollections
      - type: llm-rubric
        value: The answer identifies useCredentialsCollection in apps/one-shot/src/shared/hooks/useCredentials.ts and ties it to SyncCollectionsProvider or useSyncCollections in apps/one-shot/src/shared/collections/SyncCollectionsProvider.tsx.

  - description: explain plugin dispatch target calls
    metadata:
      expected: |
        methodChannelProbe in apps/gateway/src/realtime/methods.ts calls hasPlugin and dispatchPlugin from apps/gateway/src/channels/plugin-registry.ts.
    vars:
      question: Starting from methodChannelProbe, what important functions does it call in the plugin registry path? Name the exact file paths and method names only.
    assert:
      - type: contains
        value: apps/gateway/src/realtime/methods.ts
      - type: contains
        value: methodChannelProbe
      - type: contains
        value: apps/gateway/src/channels/plugin-registry.ts
      - type: contains
        value: dispatchPlugin
      - type: contains
        value: hasPlugin
      - type: llm-rubric
        value: The answer explains that methodChannelProbe in apps/gateway/src/realtime/methods.ts calls hasPlugin and dispatchPlugin from apps/gateway/src/channels/plugin-registry.ts.

  - description: trace path search to the gateway plugin registry area
    metadata:
      expected: |
        The key plugin-routing files under apps/gateway/src include:
        - apps/gateway/src/channels/plugin-registry.ts
        - apps/gateway/src/channels/channel-plugin.ts
        - apps/gateway/src/channels/openclaw-bridge.ts
        - apps/gateway/src/realtime/methods.ts
        - apps/gateway/src/api/client-routes.ts
        - apps/gateway/src/workers/inbound-worker.ts
        - apps/gateway/src/workers/outbound-worker.ts
    vars:
      question: Which files under apps/gateway/src are most relevant to plugin routing and channel dispatch? Name several exact paths, including the plugin registry file.
    assert:
      - type: contains
        value: apps/gateway/src/channels/plugin-registry.ts
      - type: contains
        value: apps/gateway/src/realtime/methods.ts
      - type: contains
        value: apps/gateway/src/api/client-routes.ts
      - type: llm-rubric
        value: The answer names multiple concrete files under apps/gateway/src related to plugin routing and channel dispatch, including apps/gateway/src/channels/plugin-registry.ts and at least one caller path from realtime or api routes.
