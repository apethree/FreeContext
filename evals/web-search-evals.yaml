# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Web Search Benchmark — standalone eval (NOT imported by promptfooconfig.yaml)
#
# Compares 8 search strategies on a combined coding + internet-lookup problem:
#
#   1. claude-native-web        — Claude + Anthropic native web_search tool
#   2. claude-gemini-mcp        — Claude + Gemini search MCP (via proxy), no native web
#   3. claude-opencode-exa      — Claude + direct Exa MCP call, no native web
#   4. claude-context7          — Claude + Context7 doc search MCP, no native web
#   5. claude-scout-agent       — Claude + OpenRouter scout (minimax→stepfun→nemotron+exa)
#   6a. openrouter-minimax-exa  — MiniMax M2.5:free + OpenRouter Exa web plugin
#   6b. openrouter-stepfun-exa  — StepFun 3.5:free + OpenRouter Exa web plugin
#   6c. openrouter-nemotron-native — Nemotron 120B:free + OpenRouter native web
#   7. openrouter-openai-online — GPT-4o-mini:online via OpenRouter
#   8. openrouter-qwen-online   — Qwen 3.5 27B:online via OpenRouter
#
# Metrics tracked per provider:
#   tokenUsage.prompt, tokenUsage.completion, tokenUsage.total
#   metadata.totalMs, metadata.toolCallCount, metadata.modelRounds
#   metadata.searchProvider, metadata.toolsUsed
#
# Sandboxing: providers only call external HTTP APIs; no local file writes.
# Generated code in model output is validated via static assertions only.
# See https://www.promptfoo.dev/docs/guides/sandboxed-code-evals/ for
# Docker-based execution sandbox if live code verification is needed later.

description: "Web Search Benchmark: token usage, latency, tool calls across 8 strategies"

# Load API keys from .env.local (falls back to env set by runner script)
envFile: ../.env.local

evaluateOptions:
  # concurrency=1: at 30k input TPM, Haiku (~3-8k tokens/call) is safe single-file.
  # Sonnet at concurrency=2 caused 429s (74k tokens/call × 2 = 148k >> 30k limit).
  maxConcurrency: 1
  cache: false        # always fetch fresh results for web search tasks

defaultTest:
  metadata:
    suite: web-search-evals

# ── providers ────────────────────────────────────────────────────────────────

providers:
  # 1. Claude + Anthropic native web search (beta)
  - id: file://./providers/websearch/1-claude-native-web.js
    label: "1-claude-native-web"
    metadata:
      strategy: native-anthropic
      searchProvider: anthropic-native

  # 2. Claude + Gemini MCP (runs gemini-search-mcp via localhost proxy)
  - id: file://./providers/websearch/2-claude-gemini-mcp.js
    label: "2-claude-gemini-mcp"
    metadata:
      strategy: mcp-gemini
      searchProvider: gemini-mcp

  # 3. Claude + Exa /answer API (direct REST call, no MCP subprocess, requires EXA_API_KEY)
  - id: file://./providers/websearch/3-claude-opencode-exa.js
    label: "3-claude-opencode-exa"
    metadata:
      strategy: exa-answer-direct
      searchProvider: exa-answer-direct

  # 4. Claude + Context7 documentation search
  - id: file://./providers/websearch/4-claude-context7.js
    label: "4-claude-context7"
    metadata:
      strategy: mcp-context7
      searchProvider: context7-docs

  # 5. Claude + OpenRouter scout agent (Exa-backed free model)
  - id: file://./providers/websearch/5-claude-scout-agent.js
    label: "5-claude-scout-agent"
    metadata:
      strategy: scout-openrouter
      searchProvider: openrouter-scout-exa

  # 6a. MiniMax M2.5:free:online via OpenRouter (:online suffix = web search baked in)
  # Avoids the tool-call XML leak seen with the explicit plugin config approach.
  - id: file://./providers/websearch/6-openrouter-web.js
    label: "6a-openrouter-minimax-exa"
    config:
      model: "minimax/minimax-m2.5:online"
    metadata:
      strategy: openrouter-online
      searchProvider: openrouter-online

  # 6b. StepFun 3.5 Flash:free:online via OpenRouter
  - id: file://./providers/websearch/6-openrouter-web.js
    label: "6b-openrouter-stepfun-exa"
    config:
      model: "stepfun/step-3.5-flash:free:online"
    metadata:
      strategy: openrouter-online
      searchProvider: openrouter-online

  # 6c. Nemotron 120B:free via OpenRouter + Exa web plugin
  - id: file://./providers/websearch/6-openrouter-web.js
    label: "6c-openrouter-nemotron-exa"
    config:
      model: "nvidia/nemotron-3-super-120b-a12b:free"
      webEngine: "exa"
      maxResults: 5
    metadata:
      strategy: openrouter-plugin
      searchProvider: openrouter-exa

  # 7. GPT-4o-mini via OpenRouter with :online suffix
  - id: file://./providers/websearch/6-openrouter-web.js
    label: "7-openrouter-openai-online"
    config:
      model: "openai/gpt-4o-mini:online"
    metadata:
      strategy: openrouter-online
      searchProvider: openrouter-online

  # 8. Qwen 3.5 27B via OpenRouter with :online suffix
  - id: file://./providers/websearch/6-openrouter-web.js
    label: "8-openrouter-qwen-online"
    config:
      model: "qwen/qwen3.5-27b:online"
    metadata:
      strategy: openrouter-online
      searchProvider: openrouter-online

# ── prompts ──────────────────────────────────────────────────────────────────

prompts:
  - "{{task}}"

# ── tests ────────────────────────────────────────────────────────────────────

tests:
  # ── Test 1: Coding + internet research ────────────────────────────────────
  # Models must look up the Exa MCP protocol and write working TypeScript.
  # Validates: tool name discovery, protocol format, TypeScript typing, fetch usage.
  # Sandbox note: output is statically analysed (no live code execution).
  - description: "Exa MCP direct call — write searchWithExaMcp() in TypeScript"
    vars:
      task: |
        Research the Exa MCP server and write the implementation.

        Task: write a complete TypeScript async function named `searchWithExaMcp`
        with this signature:

          async function searchWithExaMcp(
            query: string,
            numResults?: number
          ): Promise<Array<{ title: string; url: string; snippet: string }>>

        Requirements:
        1. Call the public Exa MCP endpoint at https://mcp.exa.ai/mcp directly — no npm packages, use built-in fetch only.
        2. Use the correct MCP JSON-RPC method and the correct Exa tool name (look it up if unsure).
        3. The endpoint responds with Server-Sent Events (SSE) — parse the `data:` lines to extract results.
        4. Return up to numResults results (default 5) as the typed array above.
        5. Throw a descriptive Error if the request fails or no results are returned.

        Also answer: what is the current latest version of the @modelcontextprotocol/sdk npm package?

        Provide the complete TypeScript function and the version answer.

    assert:
      # Must mention the public Exa MCP URL
      - type: icontains
        value: "mcp.exa.ai"

      # Must use the correct Exa tool name (discoverable via search)
      - type: icontains
        value: "web_search_exa"

      # Must define the required function
      - type: javascript
        value: "output.includes('searchWithExaMcp')"

      # Must use fetch (no npm HTTP clients)
      - type: javascript
        value: "output.includes('fetch')"

      # Must include TypeScript types / interface
      - type: javascript
        value: "/interface |: string|: Promise|Array</.test(output)"

      # Must parse SSE data lines
      - type: javascript
        value: "/data:|text\\/event-stream|SSE|event.stream|split.*\\\\n/.test(output)"

      # Must include a version number (any semver)
      - type: javascript
        value: "/\\d+\\.\\d+\\.\\d+/.test(output)"

      # Must not contain hallucinated placeholder URLs
      - type: javascript
        value: "!output.includes('example.com') && !output.includes('your-api-key')"

  # ── Test 2: Pure internet lookup ──────────────────────────────────────────
  # Models must find real, current npm release data.
  # Validates: recency, factual accuracy, structured output.
  - description: "Latest @modelcontextprotocol npm releases — version + date lookup"
    vars:
      task: |
        Look up and list the three most recent npm package releases published under
        the @modelcontextprotocol organization (e.g. @modelcontextprotocol/sdk and others).

        For each release, provide:
        - Package name (full @modelcontextprotocol/xxx)
        - Version number
        - Publish date

        Order from newest to oldest. If you can only find one package, list its last three versions.

        Be factual — only report versions you actually find via search. Do not guess.

    assert:
      # Must name the organization
      - type: icontains
        value: "@modelcontextprotocol"

      # Must contain semver version numbers
      - type: javascript
        value: "/\\d+\\.\\d+\\.\\d+/.test(output)"

      # Must contain a year from 2024 onwards (real recent data)
      - type: javascript
        value: "/202[4-9]/.test(output)"

      # Must list at least 2 distinct version numbers
      - type: javascript
        value: "(output.match(/\\d+\\.\\d+\\.\\d+/g) ?? []).length >= 2"

      # Must not contain unfilled template placeholders (e.g. X.X.X, but not a date format hint)
      - type: javascript
        value: "!output.includes('X.X.X') && !output.includes('[version]')"
