# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# Semantic search tool evals against the oneshot-platform fixture.
#
# These queries use natural language and run only against an embed-enabled
# server. The beforeAll hook starts a managed server on the fixture workspace
# unless FREE_CONTEXT_SEMANTIC_MCP_ENDPOINT is already set.

description: "Semantic search tool evals (fixture workspace, requires --embed)"
envFile: .env.local

extensions:
  - file://./scripts/semantic-hooks.js:semanticEvalHook

prompts:
  - "Call the requested FreeContext MCP tool and return its structured output."

providers:
  - id: file://./providers/mcp-client.js
    label: mcp-client-semantic
    config:
      endpointEnvVar: FREE_CONTEXT_SEMANTIC_MCP_ENDPOINT

evaluateOptions:
  maxConcurrency: 1
  cache: false

defaultTest:
  metadata:
    suite: semantic-tool-evals
    workspace: oneshot-platform-fixture

tests:
  - description: "semantic: plugin routing through the gateway registry"
    metadata:
      mode: semantic
      expectedSymbol: dispatchPlugin
    vars:
      tool: search_code
      args:
        query: "route channel operations through the gateway plugin registry"
        mode: semantic
        limit: 10
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).count > 0"
      - type: javascript
        value: "JSON.parse(output).results.some((r) => r.filePath === 'apps/gateway/src/channels/plugin-registry.ts')"
      - type: llm-rubric
        value: >
          The results contain at least one symbol from
          apps/gateway/src/channels/plugin-registry.ts related to plugin
          routing, such as the registry imports, the plugins collection, or
          the dispatch/hasPlugin path.

  - description: "semantic: gateway client auth from bearer tokens"
    metadata:
      mode: semantic
      expectedSymbol: requireClientAuth
    vars:
      tool: search_code
      args:
        query: "authenticate gateway client requests from bearer tokens"
        mode: semantic
        limit: 10
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).count > 0"
      - type: javascript
        value: "JSON.parse(output).results.some((r) => r.filePath === 'apps/gateway/src/api/client-auth.ts' || r.filePath === 'apps/gateway/src/api/server.ts')"
      - type: llm-rubric
        value: >
          The results contain requireClientAuth in
          apps/gateway/src/api/client-auth.ts or another auth-related symbol in
          the gateway API auth path.

  - description: "semantic: synced credentials collection hook"
    metadata:
      mode: semantic
      expectedSymbol: useCredentialsCollection
    vars:
      tool: search_code
      args:
        query: "hook returning the synced credentials collection for settings"
        mode: semantic
        limit: 10
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).count > 0"
      - type: javascript
        value: "JSON.parse(output).results.some((r) => r.symbolName === 'useCredentialsCollection' || r.symbolName === 'SyncCollectionsProvider')"

  - description: "hybrid: methods that dispatch channel plugins"
    metadata:
      mode: hybrid
      expectedSymbol: methodChannelProbe
    vars:
      tool: search_code
      args:
        query: "methods that dispatch channel plugins for probe apply and destroy"
        mode: hybrid
        limit: 10
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).count > 0"
      - type: javascript
        value: "JSON.parse(output).results.some((r) => r.symbolName === 'dispatchPlugin' || r.symbolName === 'methodChannelProbe' || r.symbolName === 'handleChannelUpsert')"
      - type: llm-rubric
        value: >
          The results include channel-plugin dispatch behavior from the gateway
          API or realtime flow, such as dispatchPlugin, methodChannelProbe, or
          handleChannelUpsert.

  - description: "semantic scoped to shared hooks and collections"
    metadata:
      mode: semantic
      expectedSymbol: SyncCollectionsProvider
    vars:
      tool: search_code
      args:
        query: "provider for synced collections used by shared hooks"
        mode: semantic
        pathPrefix: apps/one-shot/src/shared/
        limit: 10
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).count > 0"
      - type: javascript
        value: "JSON.parse(output).results.every((r) => r.filePath.startsWith('apps/one-shot/src/shared/'))"
      - type: llm-rubric
        value: >
          All results are scoped to apps/one-shot/src/shared/ and include at
          least one symbol related to SyncCollectionsProvider or the shared
          hooks that consume it.
