app = "capzero-gateway-workers"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVICE_NAME = "gateway-workers"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
