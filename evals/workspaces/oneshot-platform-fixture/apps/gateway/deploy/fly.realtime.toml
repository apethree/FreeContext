app = "capzero-gateway-realtime"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVICE_NAME = "gateway-realtime"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-2x"
  memory = "512mb"
