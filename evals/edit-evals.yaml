# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Edit tasks: coding-agent default tools vs default tools + FreeContext vs scout + default tools + FreeContext"
envFile: ../.env.local

prompts:
  - |
    You are a coding agent working in an isolated sandbox workspace.
    Use the available coding tools to inspect the files directly before proposing an edit.
    If FreeContext MCP is available, use it to locate symbols and verify exact source lines.
    All edits target files under evals/fixtures/ inside the staged workspace.

    Task: {{task}}

    Respond with:
    1. The exact file path
    2. The exact current line(s) that should change, copied verbatim
    3. The replacement line(s)
    4. A one-sentence explanation

providers:
  - id: file://./providers/edit-claude-default-tools.js
  - id: file://./providers/edit-claude-freecontext.js
  - id: file://./providers/edit-scout-provider.js
    config:
      mainProvider: anthropic
      scoutModel: qwen/qwen3.5-27b
  - id: file://./providers/edit-codex-default-tools.js
  - id: file://./providers/edit-codex-freecontext.js
  - id: file://./providers/edit-scout-provider.js
    config:
      mainProvider: codex
      scoutModel: qwen/qwen3.5-27b

evaluateOptions:
  maxConcurrency: 1
  cache: false

defaultTest:
  metadata:
    suite: edit-evals
    category: edit
  options:
    provider: anthropic:messages:claude-haiku-4-5-20251001
  assert:
    - type: javascript
      value: |
        const metadata = context.providerResponse?.metadata ?? {};
        const tier = metadata.tier;
        const localToolCount = metadata.localToolCount ?? 0;
        const mcpToolCount = metadata.mcpToolCount ?? 0;
        const scoutMcpToolCount = metadata.scoutMcpToolCount ?? 0;
        if (tier === "base") return localToolCount > 0 && mcpToolCount === 0;
        if (tier === "freecontext") return localToolCount > 0 && mcpToolCount > 0;
        if (tier === "scout") return localToolCount > 0 && mcpToolCount > 0 && scoutMcpToolCount > 0;
        return false;
    - type: not-contains
      value: "<tool_call>"
    - type: not-contains
      value: "<tool_response>"
    - type: not-contains
      value: "I don't have access"
    - type: not-contains
      value: "I don’t have access"

tests:
  - description: "change RRF k constant from 60 to 80"
    metadata:
      expected: |
        File: evals/fixtures/rrf.ts
        Current: const k = 60;
        Replacement: const k = 80;
    vars:
      task: >
        In evals/fixtures/rrf.ts, the reciprocalRankFusion function has a rank
        fusion constant k set to 60. Change it to 80. Show the exact current
        line and your replacement.
    assert:
      - type: contains
        value: evals/fixtures/rrf.ts
      - type: contains
        value: "const k = 60"
      - type: contains
        value: "const k = 80"
      - type: llm-rubric
        value: The response targets evals/fixtures/rrf.ts, quotes the exact line const k = 60, and proposes replacing it with const k = 80.

  - description: "add explicit return type to sqlString in fixtures"
    metadata:
      expected: |
        File: evals/fixtures/sql-helpers.ts
        Current signature: export function sqlString(value: unknown) {
        Replacement: export function sqlString(value: unknown): string {
    vars:
      task: >
        In evals/fixtures/sql-helpers.ts, the sqlString function has no
        explicit TypeScript return type annotation. Add ": string" as the
        return type. Show the current signature and your updated version.
    assert:
      - type: contains
        value: evals/fixtures/sql-helpers.ts
      - type: contains
        value: sqlString
      - type: contains
        value: ": string"
      - type: llm-rubric
        value: The response targets evals/fixtures/sql-helpers.ts, identifies the sqlString signature, and proposes adding : string after the parameter list.

  - description: "rename deleteRowsById to deleteByIds in fixture"
    metadata:
      expected: |
        File: evals/fixtures/delete-rows.ts
        Rename deleteRowsById to deleteByIds in the function declaration and update every in-file call site to deleteByIds.
    vars:
      task: >
        In evals/fixtures/delete-rows.ts, rename the function deleteRowsById
        to deleteByIds. List every call site in that file that needs to change,
        then show the updated function declaration and each updated call site.
    assert:
      - type: contains
        value: evals/fixtures/delete-rows.ts
      - type: contains
        value: deleteRowsById
      - type: contains
        value: deleteByIds
      - type: javascript
        value: "(output.match(/deleteRowsById/g) || []).length >= 2"
      - type: llm-rubric
        value: The response targets evals/fixtures/delete-rows.ts, lists the two call sites of deleteRowsById, shows the updated function declaration renamed to deleteByIds, and shows each call site updated.

  - description: "change writeQueue initializer from Promise.resolve() to a named sentinel"
    metadata:
      expected: |
        File: evals/fixtures/write-queue.ts
        Current: private writeQueue = Promise.resolve();
        Replacement: private writeQueue = Promise.resolve("idle");
    vars:
      task: >
        In evals/fixtures/write-queue.ts, the writeQueue field is initialized
        with Promise.resolve(). Change the initializer to
        Promise.resolve("idle") so the queue has a named initial state.
        Show the exact current line and your replacement.
    assert:
      - type: contains
        value: evals/fixtures/write-queue.ts
      - type: contains
        value: "Promise.resolve()"
      - type: contains
        value: 'Promise.resolve("idle")'
      - type: llm-rubric
        value: The response targets evals/fixtures/write-queue.ts, quotes the exact field declaration containing Promise.resolve(), and proposes replacing it with Promise.resolve("idle").
