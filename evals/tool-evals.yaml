# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: FreeContext MCP tool evals against the oneshot-platform fixture
prompts:
  - "Call the requested FreeContext MCP tool and return its structured output."
providers:
  - id: file://./providers/mcp-client.js
    label: mcp-client
evaluateOptions:
  maxConcurrency: 1
  cache: false
defaultTest:
  metadata:
    suite: tool-evals
    workspace: oneshot-platform-fixture
tests:
  - description: search_code finds dispatchPlugin in the gateway plugin registry
    vars:
      tool: search_code
      args:
        query: dispatchPlugin
        pathPrefix: apps/gateway/src/channels/
        kind: function
        limit: 5
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.symbolName === 'dispatchPlugin')"
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.filePath === 'apps/gateway/src/channels/plugin-registry.ts')"

  - description: search_paths finds the gateway plugin registry file
    vars:
      tool: search_paths
      args:
        query: plugin
        pathPrefix: apps/gateway/src/
        limit: 20
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).results.includes('apps/gateway/src/channels/plugin-registry.ts')"

  - description: find_symbol resolves dispatchPlugin as a function
    vars:
      tool: find_symbol
      args:
        name: dispatchPlugin
    assert:
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.symbolName === 'dispatchPlugin')"
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.symbolKind === 'function')"
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.filePath === 'apps/gateway/src/channels/plugin-registry.ts')"

  - description: get_symbol returns dispatchPlugin by computed id
    vars:
      tool: get_symbol
      args:
        id: __FREE_CONTEXT_GET_SYMBOL_DISPATCH_PLUGIN__
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).symbol?.symbolName === 'dispatchPlugin' && JSON.parse(output).symbol?.symbolKind === 'function' && JSON.parse(output).symbol?.filePath === 'apps/gateway/src/channels/plugin-registry.ts'"

  - description: list_file_symbols enumerates symbols in the plugin registry file
    vars:
      tool: list_file_symbols
      args:
        filePath: apps/gateway/src/channels/plugin-registry.ts
    assert:
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.symbolName === 'dispatchPlugin')"
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.symbolName === 'hasPlugin')"
      - type: javascript
        value: "JSON.parse(output).count >= 8"

  - description: who_calls finds gateway callers of dispatchPlugin
    vars:
      tool: who_calls
      args:
        symbolName: dispatchPlugin
    assert:
      - type: javascript
        value: "JSON.parse(output).count >= 5"
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.symbolName === 'methodChannelProbe')"
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.filePath === 'apps/gateway/src/api/client-routes.ts')"

  - description: what_does_this_call shows methodChannelProbe calling dispatchPlugin
    vars:
      tool: what_does_this_call
      args:
        symbolName: methodChannelProbe
    assert:
      - type: javascript
        value: "JSON.parse(output).count >= 1"
      - type: javascript
        value: "JSON.parse(output).results.some((item) => item.symbolName === 'dispatchPlugin')"

  - description: recently_changed_symbols returns a stable result shape
    vars:
      tool: recently_changed_symbols
      args: {}
    assert:
      - type: contains-json
      - type: javascript
        value: "typeof JSON.parse(output).count === 'number' && Array.isArray(JSON.parse(output).results)"

  - description: reindex reports useful indexing counts
    vars:
      tool: reindex
      args: {}
    assert:
      - type: contains-json
      - type: javascript
        value: "typeof JSON.parse(output).filesIndexed === 'number' && typeof JSON.parse(output).filesSkipped === 'number' && typeof JSON.parse(output).symbolsIndexed === 'number' && (JSON.parse(output).filesIndexed + JSON.parse(output).filesSkipped) > 0"

  - description: codebase_map returns positive counts for the fixture repo
    vars:
      tool: codebase_map
      args: {}
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).files > 100 && JSON.parse(output).symbols > 1000 && JSON.parse(output).edges > 1000"
      - type: javascript
        value: "typeof JSON.parse(output).byKind.function === 'number' && JSON.parse(output).byKind.function > 100"
